name: Post-Push Maintenance

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'live-code/**'

jobs:
  maintain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html
        run: |
          python3 - <<'EOF'
          import os, re, glob
          from pathlib import Path

          def nice_name(filepath):
              stem = Path(filepath).stem
              # strip leading digit-dash prefixes like "3-wed-" or "4-thur-"
              name = re.sub(r'^[\d]+-[a-z]+-', '', stem)
              name = name.replace('-', ' ').replace('_', ' ')
              return name.title()

          def nice_group(dirpath):
              parts = Path(dirpath).parts
              return ' / '.join(p.replace('-', ' ').replace('_', ' ').title() for p in parts)

          # Collect all html files except index.html, visualization-tools/steppers/ (internal modules), and java-academy/shared/ (authoring templates)
          all_files = sorted(f.replace('\\', '/') for f in glob.glob('**/*.html', recursive=True)
                             if f not in ('index.html',)
                             and not f.replace('\\', '/').startswith('live-code/')
                             and not f.replace('\\', '/').startswith('visualization-tools/steppers/')
                             and not f.replace('\\', '/').startswith('java-academy/shared/'))

          # Group by parent directory
          groups = {}
          for f in all_files:
              parent = str(Path(f).parent)
              groups.setdefault(parent, []).append(f)

          # Natural sort key so week-10 sorts after week-9, not after week-1
          def natural_key(s):
              return [int(c) if c.isdigit() else c.lower() for c in re.split(r'(\d+)', s)]

          # Cards that are WIP: show a No symbol and tooltip
          WIP_FILES = {'classroom-apps/live-code.html'}

          # Build card sections
          sections = ''
          for group, files in sorted(groups.items(), key=lambda x: natural_key(x[0])):
              label = 'Misc' if group == '.' else nice_group(group)
              cards = ''
              for f in files:
                  name = nice_name(f)
                  if f in WIP_FILES:
                      cards += f'<a class="card" href="{f}" title="WIP, Not Available for Usage, Contact Toph for more Info">\U0001F6AB {name}</a>\n'
                  else:
                      cards += f'<a class="card" href="{f}">{name}</a>\n'
              sections += f'<section><h2>{label}</h2><div class="cards">{cards}</div></section>\n'

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='7' y='7' width='18' height='18' rx='2' fill='%237dd3fc' stroke='%2338bdf8' stroke-width='1'/><rect x='9' y='9' width='6' height='6' rx='1' fill='white' opacity='0.5'/><circle cx='16' cy='16' r='13' fill='none' stroke='%23ef4444' stroke-width='3'/><line x1='7' y1='25' x2='25' y2='7' stroke='%23ef4444' stroke-width='3' stroke-linecap='round'/></svg>">
          <title>Icebreaker Apps</title>
          <style>
            *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
            body {{
              font-family: system-ui, sans-serif;
              background: #0f1117;
              color: #e2e8f0;
              min-height: 100vh;
              padding: 2rem 1rem 4rem;
            }}
            header {{
              text-align: center;
              margin-bottom: 3rem;
            }}
            header h1 {{
              font-size: 2rem;
              font-weight: 700;
              letter-spacing: -0.5px;
              color: #f8fafc;
            }}
            header p {{
              color: #64748b;
              margin-top: 0.4rem;
              font-size: 0.95rem;
            }}
            section {{
              max-width: 900px;
              margin: 0 auto 2.5rem;
            }}
            section h2 {{
              font-size: 0.8rem;
              text-transform: uppercase;
              letter-spacing: 1.5px;
              color: #475569;
              border-bottom: 1px solid #1e293b;
              padding-bottom: 0.5rem;
              margin-bottom: 1rem;
            }}
            .cards {{
              display: grid;
              grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
              gap: 0.75rem;
            }}
            .card {{
              display: block;
              background: #1e293b;
              color: #cbd5e1;
              text-decoration: none;
              padding: 1rem 1.25rem;
              border-radius: 8px;
              border: 1px solid #334155;
              font-size: 0.9rem;
              transition: background 0.15s, color 0.15s, border-color 0.15s;
            }}
            .card:hover {{
              background: #334155;
              color: #f1f5f9;
              border-color: #4f6080;
            }}
          </style>
          </head>
          <body>
          <header>
            <h1>Icebreaker Apps</h1>
            <p>Select an app below to open it.</p>
          </header>
          {sections}
          </body>
          </html>"""

          # Dedent (strip leading spaces from heredoc)
          lines = html.split('\n')
          dedented = '\n'.join(l[10:] if l.startswith(' ' * 10) else l for l in lines)

          with open('index.html', 'w') as fh:
              fh.write(dedented)

          print("index.html written.")
          EOF

      - name: Commit and push index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: regenerate index [skip ci]"
          git push

      - name: Inject Ably key parts (deploy only, never committed to main)
        run: |
          KEY="${{ secrets.ABLY_API_KEY }}"
          P1="${KEY:0:5}"
          P2="${KEY:5:6}"
          P3="${KEY:11:7}"
          P4="${KEY:18:8}"
          P5="${KEY:26}"
          for f in \
            java-academy/week-1/1-mon-monkey-bot.html \
            java-academy/shared/trace-liveshare.js \
            classroom-apps/live-code.html \
            classroom-apps/amnesty-box.html \
            classroom-apps/race-mode-rapid-fire.html; do
            sed -i "s|ABLY_PART_1|$P1|g" "$f"
            sed -i "s|ABLY_PART_2|$P2|g" "$f"
            sed -i "s|ABLY_PART_3|$P3|g" "$f"
            sed -i "s|ABLY_PART_4|$P4|g" "$f"
            sed -i "s|ABLY_PART_5|$P5|g" "$f"
          done

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,live-code,node_modules'
