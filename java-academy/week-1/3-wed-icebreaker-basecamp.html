<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
<title>Base Camp Orientation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f0f4f8;
    --text:         #0d1f2d;
    --accent1:      #2a7a4b;
    --accent1-hover:#4a9a6a;
    --accent2:      #1a4f7a;
    --card-bg:      #ffffff;
    --border:       #c8d8e4;
    --error:        #c0392b;
    --text-muted:   #4a6070;
    --divider:      #c8d8e4;
    --badge-bg:     #e8f4ec;
    --badge-text:   #2a7a4b;
    --tech-bg:      #e8f0f8;
    --tech-text:    #1a4f7a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    overflow: hidden;
  }

  /* === LAYOUT === */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    z-index: 1;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* === LOAD SCREEN === */
  .load-emblem {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.35em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .load-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(52px, 7vw, 80px);
    font-weight: 400;
    color: var(--text);
    line-height: 1;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .load-subtitle {
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    color: var(--text-muted);
    margin-bottom: 48px;
    text-align: center;
  }

  .load-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 40px 48px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(13,31,45,0.10);
    position: relative;
  }

  .load-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent1);
  }

  .load-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .load-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 32px;
    font-weight: 400;
    text-align: center;
    padding: 12px;
    outline: none;
    caret-color: var(--accent1);
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  .load-input::-webkit-inner-spin-button,
  .load-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .load-input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(42,122,75,0.15);
  }

  .btn-primary {
    display: block;
    width: 100%;
    margin-top: 28px;
    padding: 18px 32px;
    background: var(--accent1);
    color: #ffffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    cursor: pointer;
    min-height: 56px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .btn-primary:hover {
    background: var(--accent1-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(42,122,75,0.25);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:focus-visible {
    outline: 3px solid var(--accent1);
    outline-offset: 3px;
  }

  /* === CARD SCREEN === */
  .card-screen {
    gap: 16px;
    overflow-y: auto;
    justify-content: flex-start;
    padding-top: 24px;
    padding-bottom: 32px;
  }

  .progress-bar-wrap {
    width: 100%;
    max-width: 820px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    padding-top: 4px;
  }

  .progress-track {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent1);
    border-radius: 0;
    transition: width 0.5s ease;
  }

  .progress-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 150px;
    text-align: right;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 36px 48px 40px;
    max-width: 820px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(13,31,45,0.08);
    position: relative;
    animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent2);
  }

  .recruit-header {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--divider);
  }

  .question-block {
    padding: 20px 0;
    border-bottom: 1px solid var(--divider);
  }
  .question-block:last-of-type {
    border-bottom: none;
  }

  .card-type-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .type-fun {
    background: var(--badge-bg);
    color: var(--badge-text);
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 0.2em;
  }

  .type-tech {
    background: var(--tech-bg);
    color: var(--tech-text);
    padding: 3px 10px;
    font-size: 11px;
    letter-spacing: 0.2em;
  }

  .type-icon {
    font-size: 16px;
    line-height: 1;
  }

  .card-question {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(20px, 2.5vw, 26px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 14px;
  }

  .answer-input {
    width: 100%;
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 0;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    padding: 10px 14px;
    outline: none;
    caret-color: var(--accent1);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .answer-input:focus {
    border-color: var(--accent1);
    box-shadow: 0 0 0 3px rgba(42,122,75,0.12);
  }
  .answer-input::placeholder { color: rgba(13,31,45,0.35); }

  .btn-reveal {
    background: transparent;
    border: 2px solid var(--accent2);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 0;
    cursor: pointer;
    min-height: 48px;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-reveal:hover {
    background: var(--tech-bg);
  }
  .btn-reveal:focus-visible {
    outline: 3px solid var(--accent2);
    outline-offset: 3px;
  }

  .answer-reveal {
    background: #eaf4f0;
    border: 1px solid #b8dcc8;
    border-radius: 0;
    border-left: 4px solid var(--accent1);
    padding: 14px 18px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    margin-top: 10px;
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .answer-reveal.shown { display: block; }

  .question-code {
    background: #d6e8f5;
    color: #0d1f2d;
    font-family: 'JetBrains Mono', monospace;
    font-feature-settings: "liga" 0, "calt" 0;
    font-variant-ligatures: none;
    font-size: 15px;
    padding: 14px 18px;
    border-left: 4px solid var(--accent2);
    margin: 12px 0;
    overflow-x: auto;
    white-space: pre;
    line-height: 1.8;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--divider);
  }

  .btn-next {
    width: 100%;
    padding: 16px 32px;
    background: var(--accent1);
    color: #ffffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    cursor: pointer;
    min-height: 56px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-next:hover {
    background: var(--accent1-hover);
    box-shadow: 0 4px 16px rgba(42,122,75,0.2);
    transform: translateY(-1px);
  }
  .btn-next:focus-visible {
    outline: 3px solid var(--accent1);
    outline-offset: 3px;
  }

  /* === FINALE SCREEN === */
  .finale-screen {
    gap: 0;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 40px 32px 48px;
    justify-content: flex-start;
    align-items: center;
    -webkit-overflow-scrolling: touch;
    height: 100%;
  }

  .finale-header {
    text-align: center;
    margin-bottom: 32px;
    width: 100%;
    max-width: 800px;
    flex-shrink: 0;
  }

  .finale-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.38em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .finale-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    color: var(--accent2);
    line-height: 1.1;
  }

  .finale-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 0;
    padding: 44px 52px;
    max-width: 800px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(13,31,45,0.10);
    position: relative;
    animation: cardIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  .finale-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent1);
  }

  /* === CLOSING LINE === */
  .closing-line {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(20px, 2.6vw, 28px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.65;
    text-align: center;
    padding: 8px 0;
  }

  .slot-hl {
    color: var(--accent1);
    font-weight: 700;
  }

  .btn-restart {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 40px;
    background: var(--accent1);
    color: #ffffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 0;
    cursor: pointer;
    min-height: 56px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.15s;
  }
  .btn-restart:hover {
    background: var(--accent1-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(42,122,75,0.25);
  }
  .btn-restart:focus-visible {
    outline: 3px solid var(--accent1);
    outline-offset: 3px;
  }

  .divider-rule {
    width: 80px;
    height: 3px;
    background: var(--border);
    margin: 18px auto;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- LOAD SCREEN -->
<main id="screen-load" class="screen active" aria-label="Base Camp Orientation setup">
  <div class="load-emblem" aria-hidden="true">&#9651; Alpine Java Academy &#9651;</div>
  <h1 class="load-title">BASE CAMP</h1>
  <p class="load-subtitle">Climber Orientation -- Week 1</p>
  <div class="load-card">
    <label class="load-label" for="recruit-count">How many climbers today?</label>
    <input
      class="load-input"
      id="recruit-count"
      type="number"
      min="6"
      max="25"
      value="25"
      aria-describedby="recruit-help"
    />
    <p id="recruit-help" class="sr-only">Enter a number between 6 and 25</p>
    <button class="btn-primary" id="btn-start" onclick="startSession()">
      &#9651; Begin Ascent
    </button>
  </div>
</main>

<!-- CARD SCREEN -->
<section id="screen-card" class="screen card-screen" aria-label="Current orientation card" aria-live="polite">
  <div class="progress-bar-wrap" role="group" aria-label="Session progress">
    <div class="progress-track" aria-hidden="true">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label" aria-live="off"></div>
  </div>
  <div id="card-container" style="width:100%;max-width:820px;"></div>
</section>

<!-- FINALE SCREEN -->
<section id="screen-finale" class="screen finale-screen" aria-label="Expedition log finale">
  <div class="finale-header">
    <p class="finale-eyebrow">Expedition Log: Complete</p>
    <h2 class="finale-title">Summit Reached</h2>
  </div>
  <div class="finale-card">
    <div class="divider-rule" aria-hidden="true"></div>
    <div class="closing-line" id="closing-line" role="region" aria-label="Expedition closing note"></div>
    <div class="divider-rule" aria-hidden="true"></div>
  </div>
  <button class="btn-restart" onclick="restartSession()">
    <span aria-hidden="true">&#8635;</span> Start Over
  </button>
</section>

<script>
/* =============================================
   DATA: FUN QUESTIONS
   4 pairs. Each pair maps to one mad lib paragraph.
   Small class (6-12): 3 randomly chosen pairs (6 fun Qs).
   Large class (13-25): all 4 pairs (8 fun Qs).
   Both questions from a pair always appear together.
   ============================================= */

const FUN_QUESTIONS = [
  // Pair 0: controversialfood + weirdtalent
  {
    q: "What is a food opinion you hold that most people would consider wrong?",
    slot: "controversialfood", label: "a controversial food take", pair: 0,
    placeholder: "noun phrase"
  },
  {
    q: "What is a weird or unexpected talent most people do not know you have?",
    slot: "weirdtalent", label: "a weird talent", pair: 0,
    placeholder: "gerund phrase"
  },
  // Pair 1: mountainanimal + onemeal
  {
    q: "If your debugging instinct were a mountain animal, what would it be?",
    slot: "mountainanimal", label: "a mountain animal", pair: 1,
    placeholder: "noun"
  },
  {
    q: "If you had to eat the same meal every day for the rest of your life, what would it be?",
    slot: "onemeal", label: "a meal", pair: 1,
    placeholder: "noun phrase"
  },
  // Pair 2: focussong + resetritual
  {
    q: "What song or artist do you put on when you need to focus or hype yourself up?",
    slot: "focussong", label: "a song or artist", pair: 2,
    placeholder: "a title or artist"
  },
  {
    q: "When you hit a wall on a hard problem, what is your go-to reset? Walk, snack, stare out a window, something else?",
    slot: "resetritual", label: "a reset ritual", pair: 2,
    placeholder: "gerund phrase"
  },
  // Pair 3: summitview + weatherforecast
  {
    q: "What is the one thing you are most looking forward to being able to do by the end of this bootcamp?",
    slot: "summitview", label: "a goal", pair: 3,
    placeholder: "gerund phrase"
  },
  {
    q: "If the first week of this bootcamp were a weather forecast, what would you predict for yourself?",
    slot: "weatherforecast", label: "a weather forecast", pair: 3,
    placeholder: "noun phrase"
  },
  // Unpaired fun questions -- verbal only, never feed the mad lib
  // These are the first to drop when class size is small
  {
    q: "What is something on your personal to-learn list that has nothing to do with coding?",
    slot: null, pair: null
  },
  {
    q: "What is one place you have never been that you most want to visit?",
    slot: null, pair: null
  },
  {
    q: "What is a skill or hobby you tried once and immediately wanted to get better at?",
    slot: null, pair: null
  },
  {
    q: "What is something most people in this room probably do not know about where you grew up?",
    slot: null, pair: null
  }
];

/* =============================================
   DATA: TECH QUESTIONS
   ============================================= */

const TECH_QUESTIONS = [
  {
    q: "A base camp registration needs to store a climber's name. Which data type should `climberName` be declared as?",
    answer: "String -- climberName holds text, not a number or true/false value. Example: String climberName = \"Maya\";"
  },
  {
    q: "A trail log needs to record the distance hiked as a whole number of kilometers. Which data type is correct for `trailDistance`?",
    answer: "int -- trailDistance holds whole numbers only. Example: int trailDistance = 14;"
  },
  {
    q: "The gear weigh-in system needs to store `packWeight` with decimal precision. Which data type should it use?",
    answer: "double -- packWeight can hold decimal values. Example: double packWeight = 18.5;"
  },
  {
    q: "A climber check-in form needs a field `isCertified` that is either true or false. Which data type fits?",
    answer: "boolean -- isCertified can only be true or false. Example: boolean isCertified = true;"
  },
  {
    q: "The trail system stores `baseElevation` as 1200 and `summitElevation` as 4350. What Java expression calculates the elevation gain?",
    answer: "summitElevation - baseElevation, which gives 3150. Both are ints, so the result is also an int."
  },
  {
    q: "A route planner checks: if (packWeight > 25.0) -- what will Java do if packWeight is 22.3?",
    answer: "The condition is false, so Java skips the if-block and moves on. 22.3 is not greater than 25.0."
  },
  {
    q: "The base camp system prints a welcome message using climberName. Write out the exact Java statement that does this -- from memory.",
    answer: "System.out.println(climberName); -- Use System.out.println() with parentheses. Square brackets and a plain print() call are not valid Java syntax."
  },
  {
    q: "True or false: you can safely compare two Strings in Java using ==. Explain your answer.",
    answer: "False. == checks if two variables point to the same object in memory, not whether they contain the same text. Use .equals() to compare String content — for example: name.equals(\"Alice\") instead of name == \"Alice\"."
  },
  {
    q: "Are Git and GitHub the same thing? What is the difference?",
    answer: "No. Git is a version control system that runs on your computer and tracks changes to your code. GitHub is a cloud platform that hosts Git repositories so teams can share and collaborate. Git is the tool; GitHub is the service built on top of it."
  },
  {
    q: "gearIndex starts at 0. If the line below runs three times, what is gearIndex now? Say your reasoning out loud.",
    code: "gearIndex = gearIndex + 1;",
    answer: "3 -- it started at 0 and was incremented by 1 three separate times."
  },
  {
    q: "trailDistance is 20. What does this code print, and why does that condition pass?",
    code: "if (trailDistance >= 20) {\n    System.out.println(\"Long route\");\n} else {\n    System.out.println(\"Short route\");\n}",
    answer: "\"Long route\" -- the condition uses >= (greater than or equal to), so 20 satisfies it."
  },
  {
    q: "Declare and assign a String variable named climberName with the value 'Alex' in Java. Write it from memory -- say it out loud first if it helps.",
    answer: "String climberName = \"Alex\"; -- String must be capitalized in Java. Include the type (String), the variable name, = sign, and the value in double quotes."
  },
  {
    q: "A registration form checks: if (isCertified == true) -- what simpler way can you write this condition in Java?",
    answer: "if (isCertified) -- since isCertified is already a boolean, comparing it to true is redundant. The variable itself is the condition."
  },
  {
    q: "A climber's pack has 3 items. What is the last valid index for the `gear` array, and why?",
    answer: "Index 2 -- arrays are zero-indexed, so a 3-element array has valid indices 0, 1, and 2. Index 3 would throw an ArrayIndexOutOfBoundsException."
  },
  {
    q: "The system needs to store a climber's age as a whole number. Should it use int or double? Why?",
    answer: "int -- age is a whole number, so double's decimal precision is unnecessary. Use the most specific type that fits the data."
  },
  {
    q: "What is the difference between = and == in Java? Give an example of each.",
    answer: "= assigns a value: int x = 5; -- == compares two values: if (x == 5) returns true. Mixing them up is one of the most common beginner bugs."
  },
  {
    q: "A trail condition check prints 'Icy' only when temp is below 0. Write the if statement from memory.",
    answer: "if (temp < 0) { System.out.println(\"Icy\"); } -- the condition must use < (less than), not <= unless 0 degrees should also count."
  },
  {
    q: "Why does Java require you to declare a data type when creating a variable?",
    answer: "Java is statically typed -- it needs to know the type at compile time so it can allocate the right memory and catch type errors before the program runs."
  }
];

/* =============================================
   CLOSING ONE-LINER
   ============================================= */

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function hl(val) {
  return `<span class="slot-hl">${escapeHtml(val)}</span>`;
}

const CLOSING_LINES = [
  // single-slot — let the answer be the whole thing
  {
    needs: ['weatherforecast'],
    build: a => `The forecast is ${hl(a.weatherforecast)}. It was always going to be ${hl(a.weatherforecast)}.`
  },
  {
    needs: ['mountainanimal'],
    build: a => `${hl(a.mountainanimal)}. Yes. Of course. The mountain knew.`
  },
  {
    needs: ['onemeal'],
    build: a => `To eat ${hl(a.onemeal)} every day forever is not suffering. Suffering is thinking there was another option.`
  },
  {
    needs: ['resetritual'],
    build: a => `The one who resets by ${hl(a.resetritual)} has already found the path. The mountain does not explain why.`
  },
  {
    needs: ['weirdtalent'],
    build: a => `The hidden talent is ${hl(a.weirdtalent)}. This will matter. The mountain does not say when.`
  },
  {
    needs: ['focussong'],
    build: a => `${hl(a.focussong)} plays. You do not choose the mountain. The mountain chooses the song.`
  },
  {
    needs: ['summitview'],
    build: a => `The goal is to ${hl(a.summitview)}. The mountain has heard this before. The mountain is not worried.`
  },
  {
    needs: ['controversialfood'],
    build: a => `Someone on this trail believes ${hl(a.controversialfood)}. The mountain does not judge. The mountain is a mountain.`
  },
  // two-slot — connection is the joke
  {
    needs: ['mountainanimal', 'onemeal'],
    build: a => `Debug like a ${hl(a.mountainanimal)}. Eat ${hl(a.onemeal)} forever. This is the way.`
  },
  {
    needs: ['focussong', 'resetritual'],
    build: a => `The climb begins with ${hl(a.focussong)}. When it falls apart, ${hl(a.resetritual)}. The mountain has seen this. The mountain says nothing.`
  },
  {
    needs: ['weatherforecast', 'summitview'],
    build: a => `Forecast: ${hl(a.weatherforecast)}. Goal: ${hl(a.summitview)}. The mountain filed both under "we'll see."`
  },
  {
    needs: ['mountainanimal', 'weirdtalent'],
    build: a => `The instinct of a ${hl(a.mountainanimal)}. The gift of ${hl(a.weirdtalent)}. The mountain has no notes. The mountain is impressed. Possibly.`
  },
  {
    needs: ['controversialfood', 'onemeal'],
    build: a => `Strong opinions about ${hl(a.controversialfood)}. Would eat ${hl(a.onemeal)} forever. The mountain respects the commitment. The mountain does not share it.`
  },
  {
    needs: ['resetritual', 'summitview'],
    build: a => `The plan is to ${hl(a.summitview)}. The backup plan is ${hl(a.resetritual)}. The mountain approves of having a backup plan.`
  },
  {
    needs: ['focussong', 'summitview'],
    build: a => `The song is ${hl(a.focussong)}. The summit is ${hl(a.summitview)}. One of these will happen first. The mountain is not saying which.`
  },
];

function buildOneLiner(a) {
  const v = k => (a[k] || '').trim();
  const eligible = CLOSING_LINES.filter(t => t.needs.every(k => v(k)));
  if (!eligible.length) return 'Summit reached. The trail is open.';
  const t = eligible[Math.floor(Math.random() * eligible.length)];
  const mapped = {};
  t.needs.forEach(k => { mapped[k] = v(k); });
  return t.build(mapped);
}

/* =============================================
   FLAVOR LABELS
   ============================================= */

const FUN_LABELS = [
  { icon: "&#9651;", text: "Trail Brief" },
  { icon: "&#128507;", text: "Base Camp Chat" },
  { icon: "&#127968;", text: "Gear Check" },
  { icon: "&#127956;", text: "Summit Story" },
  { icon: "&#127775;", text: "Acclimatization" }
];

const TECH_LABELS = [
  { icon: "&#9651;", text: "Altitude Test" },
  { icon: "&#128506;", text: "Navigation Drill" },
  { icon: "&#9928;", text: "Weather Check" },
  { icon: "&#128270;", text: "Route Planning" },
  { icon: "&#127956;", text: "Terrain Read" }
];

function randomLabel(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

/* =============================================
   SESSION STATE
   ============================================= */

let groups = [];
let currentGroup = 0;
let funAnswers = {};
let cohortSize = 0;

/* =============================================
   FISHER-YATES SHUFFLE
   ============================================= */

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* =============================================
   BUILD GROUPS

   Total question counts (fixed):
     6-12 students  --> 12 total: 6 paired fun (3 random pairs) + 6 tech
     13-25 students --> 25 total: 8 paired fun (all 4 pairs) + up to 4 unpaired fun + tech to fill

   Priority order when slots are limited:
     1. Paired fun questions (always included, pairs never split)
     2. Unpaired fun questions (fill remaining fun slots after pairs)
     3. Tech questions (fill everything else)

   Pair integrity: both questions from a selected pair
   always appear together. Pairs are never split.

   Distribution: questions dealt round-robin across
   shuffled student order. No student gets more than 2.
   ============================================= */

function buildGroups(n) {
  const isSmall = n <= 12;
  const totalQs = isSmall ? 12 : 25;

  // --- Tier 1: paired fun questions ---
  const allPairIds = [0, 1, 2, 3];
  const selectedPairIds = isSmall
    ? shuffle(allPairIds).slice(0, 3)  // 3 random pairs = 6 questions
    : allPairIds;                       // all 4 pairs = 8 questions

  const pairedPool = [];
  selectedPairIds.forEach(pairId => {
    const pairQs = FUN_QUESTIONS.filter(q => q.pair === pairId);
    shuffle(pairQs).forEach(q => pairedPool.push({ ...q, type: 'fun' }));
  });
  // pairedPool.length === 6 (small) or 8 (large)

  // --- Tier 2: unpaired fun questions (fill remaining slots up to totalQs) ---
  const remaining = totalQs - pairedPool.length;
  const unpairedAll = shuffle(
    FUN_QUESTIONS.filter(q => q.pair === null).map(q => ({ ...q, type: 'fun' }))
  );
  const unpairedPool = unpairedAll.slice(0, Math.min(unpairedAll.length, remaining));
  // For small class: 0 unpaired (6 paired + 6 tech = 12, no room)
  // For large class: up to 4 unpaired (8 paired + 4 unpaired + 13 tech = 25)

  // --- Tier 3: tech fills the rest ---
  const techNeeded = totalQs - pairedPool.length - unpairedPool.length;
  const techPool = shuffle(
    TECH_QUESTIONS.map(q => ({ ...q, type: 'tech' }))
  ).slice(0, techNeeded);

  // --- Combine and distribute ---
  const allQuestions = [...pairedPool, ...unpairedPool, ...techPool];
  // allQuestions.length === totalQs exactly

  const studentOrder = shuffle(Array.from({ length: n }, (_, i) => i));
  const result = Array.from({ length: n }, () => []);

  allQuestions.forEach((q, idx) => {
    result[studentOrder[idx % n]].push(q);
  });

  // Fun before tech on each card
  result.forEach(g => g.sort((a, b) => (a.type === 'fun' ? -1 : 1)));

  return result;
}

/* =============================================
   SESSION CONTROL
   ============================================= */

function startSession() {
  const input = document.getElementById('recruit-count');
  let n = parseInt(input.value, 10);
  if (isNaN(n) || n < 6) n = 6;
  if (n > 25) n = 25;
  input.value = n;

  groups = buildGroups(n);
  currentGroup = 0;
  funAnswers = {};
  cohortSize = n;

  showScreen('screen-card');
  renderGroup();
}

function saveGroupAnswers() {
  const group = groups[currentGroup];
  group.forEach((card, i) => {
    if (card.type === 'fun' && card.slot) {
      const inp = document.getElementById(`ans-${i}`);
      if (inp) funAnswers[card.slot] = inp.value;
    }
  });
}

function nextGroup() {
  saveGroupAnswers();
  currentGroup++;
  if (currentGroup >= groups.length) {
    showFinale();
  } else {
    renderGroup();
    document.getElementById('screen-card').scrollTop = 0;
  }
}

function showFinale() {
  document.getElementById('closing-line').innerHTML = buildOneLiner(funAnswers);
  showScreen('screen-finale');
  document.getElementById('screen-finale').scrollTop = 0;
}

function renderGroup() {
  const group = groups[currentGroup];
  const totalGroups = groups.length;

  const pct = (currentGroup / totalGroups) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    `Climber ${currentGroup + 1} of ${totalGroups}`;

  const isLast = currentGroup === totalGroups - 1;
  const nextLabel = isLast ? 'Summit Reached -- Finish' : 'Next Climber';

  let blocksHTML = '';
  group.forEach((card, i) => {
    const isFun = card.type === 'fun';
    const labelData = isFun ? randomLabel(FUN_LABELS) : randomLabel(TECH_LABELS);
    const typeClass = isFun ? 'type-fun' : 'type-tech';

    let zoneHTML = '';
    if (isFun && card.slot) {
      // Paired fun question -- capture answer for mad lib
      const savedVal = funAnswers[card.slot] ? escapeAttr(funAnswers[card.slot]) : '';
      zoneHTML = `
        <label class="sr-only" for="ans-${i}">Type the climber's answer</label>
        <input
          class="answer-input"
          id="ans-${i}"
          type="text"
          placeholder="${escapeAttr(card.placeholder)}"
          autocomplete="off"
          spellcheck="false"
          value="${savedVal}"
          data-slot="${escapeAttr(card.slot)}"
        />
      `;
    } else if (isFun) {
      // Unpaired fun question -- verbal only, no input needed
      zoneHTML = '';
    } else {
      zoneHTML = `
        <div class="reveal-zone">
          <button class="btn-reveal" onclick="toggleReveal(this)" aria-expanded="false">
            <span aria-hidden="true">&#128065;</span>
            <span class="reveal-btn-label">Reveal Answer</span>
          </button>
          <div class="answer-reveal" role="region" aria-label="Expected answer">${escapeHtml(card.answer)}</div>
        </div>
      `;
    }

    const codeHTML = card.code
      ? `<pre class="question-code" aria-label="Code example"><code>${escapeHtml(card.code)}</code></pre>`
      : '';

    blocksHTML += `
      <div class="question-block">
        <div class="card-type-label">
          <span class="type-icon" aria-hidden="true">${labelData.icon}</span>
          <span class="${typeClass}">${labelData.text}</span>
        </div>
        <h2 class="card-question">${escapeHtml(card.q)}</h2>
        ${codeHTML}
        ${zoneHTML}
      </div>
    `;
  });

  const cardHTML = `
    <div class="card" role="article">
      <div class="recruit-header">Climber ${currentGroup + 1} of ${totalGroups}</div>
      ${blocksHTML}
      <div class="card-footer">
        <button class="btn-next" onclick="nextGroup()">
          <span>${nextLabel}</span>
          <span aria-hidden="true">&#8594;</span>
        </button>
      </div>
    </div>
  `;

  const container = document.getElementById('card-container');
  container.innerHTML = cardHTML;

  const cardEl = container.querySelector('.card');
  cardEl.style.animation = 'none';
  void cardEl.offsetWidth;
  cardEl.style.animation = '';

  const firstInput = container.querySelector('.answer-input');
  if (firstInput) setTimeout(() => firstInput.focus(), 200);
}

function toggleReveal(btn) {
  const isExpanded = btn.getAttribute('aria-expanded') === 'true';
  const revealEl = btn.nextElementSibling;
  const labelEl = btn.querySelector('.reveal-btn-label');
  if (isExpanded) {
    btn.setAttribute('aria-expanded', 'false');
    revealEl.classList.remove('shown');
    labelEl.textContent = 'Reveal Answer';
  } else {
    btn.setAttribute('aria-expanded', 'true');
    revealEl.classList.add('shown');
    labelEl.textContent = 'Hide Answer';
  }
}

function restartSession() {
  showScreen('screen-load');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.setAttribute('aria-hidden', 'true');
  });
  const target = document.getElementById(id);
  target.classList.add('active');
  target.removeAttribute('aria-hidden');
}

function escapeAttr(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

document.getElementById('recruit-count').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startSession();
});

document.getElementById('recruit-count').addEventListener('blur', function() {
  let v = parseInt(this.value, 10);
  if (isNaN(v) || v < 6) v = 6;
  if (v > 25) v = 25;
  this.value = v;
});
</script>
