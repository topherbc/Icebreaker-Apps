appId: com.topherbc.livecode
productName: LiveCode

files:
  - "**/*"
  - "!node_modules/**"
  - "!.git/**"
  - "!*.md"

# Bundle live-code.html from the sibling web-app folder.
# extraResources places it at Resources/visualization-tools/live-code.html
# (a real filesystem path, not inside the asar), which main.js reads via
# process.resourcesPath when app.isPackaged is true.
extraResources:
  - from: "../visualization-tools/live-code.html"
    to: "visualization-tools/live-code.html"

# Inject Ably key at build time via CI environment variable.
# GitHub Actions sets ABLY_API_KEY; electron-builder substitutes it here
# via extraMetadata so the renderer can read it from app.getVersion() context.
# See main.js — key is injected into the renderer via preload.
extraMetadata:
  ablyKey: ${env.ABLY_API_KEY}

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "LiveCode-Setup.exe"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.education
  artifactName: "LiveCode-${arch}.dmg"

dmg:
  title: "LiveCode Installer"

publish:
  provider: github
  owner: topherbc
  repo: Icebreaker-Apps
